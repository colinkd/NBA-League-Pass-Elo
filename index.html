<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NBA Game Ranker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F4F0;
    --surface: #ffffff;
    --border: #e0deda;
    --border-light: #ede9e3;
    --text: #1a1a1a;
    --text-2: #888780;
    --text-3: #B4B2A9;
    --amber: #BA7517;
    --amber-light: #FAC775;
    --amber-dark: #854F0B;
    --silver: #888780;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --radius: 12px;
    --radius-sm: 7px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1918;
      --surface: #242220;
      --border: #3a3835;
      --border-light: #2e2c2a;
      --text: #f0ede8;
      --text-2: #888780;
      --text-3: #5a5855;
      --blue-light: #0c2440;
    }
  }

  html { font-size: 15px; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  .page { max-width: 560px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .site-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
  .site-title { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--amber); letter-spacing: -0.5px; }
  .site-sub { font-size: 12px; color: var(--text-3); font-family: var(--mono); }

  .tabs { display: flex; gap: 1px; margin-bottom: 1.5rem; background: var(--border); border-radius: var(--radius-sm); padding: 1px; overflow: hidden; }
  .tab { flex: 1; padding: 9px 12px; font-size: 12px; font-weight: 500; font-family: var(--mono); text-align: center; cursor: pointer; color: var(--text-2); background: transparent; border: none; border-radius: calc(var(--radius-sm) - 1px); transition: all 0.15s; letter-spacing: 0.3px; }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface); color: var(--text); }

  .matchup-progress { font-family: var(--mono); font-size: 11px; color: var(--text-3); text-align: center; margin-bottom: 1rem; letter-spacing: 0.5px; }

  .vs-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: start; margin-bottom: 1rem; }
  .team-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px 14px; cursor: pointer; text-align: center; transition: all 0.12s; width: 100%; }
  .team-btn:hover { border-color: var(--amber); background: var(--bg); transform: translateY(-1px); }
  .team-btn:active { transform: translateY(0); }
  .team-btn img { width: 52px; height: 52px; object-fit: contain; display: block; margin: 0 auto 10px; }
  .team-btn .t-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .team-btn .t-rating { font-family: var(--mono); font-size: 11px; color: var(--amber); }
  .vs-mid { display: flex; align-items: center; justify-content: center; padding-top: 36px; font-family: var(--mono); font-size: 11px; color: var(--text-3); }

  .skip-wrap { text-align: center; margin-bottom: 1.5rem; }
  .skip-btn { font-size: 12px; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: var(--sans); text-decoration: underline; text-underline-offset: 2px; }

  .section-label { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.75rem; }

  .rank-list { border-top: 0.5px solid var(--border-light); }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border-light); }
  .rank-num { font-family: var(--mono); font-size: 11px; color: var(--text-3); width: 20px; flex-shrink: 0; }
  .rank-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
  .rank-name { font-size: 12px; color: var(--text); flex: 1; }
  .rank-bar-wrap { width: 72px; flex-shrink: 0; }
  .rank-bar-track { background: var(--border-light); border-radius: 2px; height: 3px; }
  .rank-bar-fill { height: 3px; border-radius: 2px; background: var(--amber); }
  .rank-elo { font-family: var(--mono); font-size: 11px; color: var(--text-3); width: 36px; text-align: right; flex-shrink: 0; }

  .done-banner { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.25rem; display: flex; gap: 10px; align-items: center; }
  .done-text { flex: 1; font-size: 12px; color: var(--text-2); }
  .done-text strong { color: var(--text); font-weight: 500; display: block; margin-bottom: 2px; }
  .btn { padding: 8px 14px; font-size: 12px; font-family: var(--mono); border: 0.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; background: var(--surface); color: var(--text); letter-spacing: 0.3px; transition: all 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--bg); border-color: var(--amber); }
  .btn-amber { background: var(--amber); color: #fff; border-color: var(--amber); }
  .btn-amber:hover { background: var(--amber-dark); border-color: var(--amber-dark); }

  .saved-note { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-align: center; margin-top: 1rem; letter-spacing: 0.3px; }

  .game-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .game-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .game-rank-num { font-family: var(--mono); font-size: 16px; font-weight: 500; }
  .rank-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .game-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 6px; }
  .g-team { text-align: center; }
  .g-team img { width: 40px; height: 40px; object-fit: contain; display: block; margin: 0 auto 5px; }
  .g-team .g-abbr { font-size: 13px; font-weight: 500; color: var(--text); }
  .g-team .g-elo { font-family: var(--mono); font-size: 11px; color: var(--amber); margin-top: 2px; }
  .g-mid { text-align: center; }
  .g-at { font-size: 10px; color: var(--text-3); font-family: var(--mono); letter-spacing: 0.5px; }
  .g-time { font-size: 12px; font-weight: 500; color: var(--text); margin: 4px 0; }
  .g-combined { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--amber); margin-top: 4px; }
  .g-badge { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 5px; margin-top: 4px; letter-spacing: 0.3px; }
  .badge-lp { background: var(--bg); color: var(--text-3); border: 0.5px solid var(--border); }
  .badge-tv { background: var(--blue-light); color: var(--blue); }

  .games-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .games-date { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.5px; }
  .refresh-btn { font-family: var(--mono); font-size: 11px; color: var(--text-3); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm); }
  .refresh-btn:hover { background: var(--border-light); color: var(--text); }

  .loading { text-align: center; padding: 3rem 0; font-family: var(--mono); font-size: 12px; color: var(--text-3); letter-spacing: 0.5px; }
  .no-games { text-align: center; padding: 3rem 0; font-size: 13px; color: var(--text-2); }

  .games-note { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 1rem; font-family: var(--mono); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="site-title">NBA // GAME RANKER</div>
    <div class="site-sub">powered by your picks</div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-ranker" onclick="switchTab('ranker')">my rankings</button>
    <button class="tab" id="tab-games" onclick="switchTab('games')">tonight's games</button>
  </div>

  <div id="view-ranker">
    <div class="matchup-progress" id="progress"></div>
    <div class="vs-wrap" id="vs-wrap">
      <button class="team-btn" id="btn-a" onclick="pick(0)">
        <img id="logo-a" src="" alt=""/>
        <div class="t-name" id="name-a"></div>
        <div class="t-rating" id="rating-a"></div>
      </button>
      <div class="vs-mid">vs</div>
      <button class="team-btn" id="btn-b" onclick="pick(1)">
        <img id="logo-b" src="" alt=""/>
        <div class="t-name" id="name-b"></div>
        <div class="t-rating" id="rating-b"></div>
      </button>
    </div>
    <div class="skip-wrap">
      <button class="skip-btn" onclick="skip()">skip — too close to call</button>
    </div>
    <div id="done-banner" style="display:none;" class="done-banner">
      <div class="done-text">
        <strong>round complete</strong>
        ratings saved — run another round to refine
      </div>
      <button class="btn" onclick="newRound()">↺ again</button>
      <button class="btn btn-amber" onclick="switchTab('games')">games ↗</button>
    </div>
    <div class="section-label" id="rankings-label" style="display:none;">your rankings</div>
    <div class="rank-list" id="rankings"></div>
    <div class="saved-note" id="saved-note"></div>
  </div>

  <div id="view-games" style="display:none;">
    <div class="games-header">
      <div class="games-date" id="games-date"></div>
      <button class="refresh-btn" onclick="loadGames()">↻ refresh</button>
    </div>
    <div id="games-content"><div class="loading">loading games...</div></div>
    <div class="games-note" id="games-note"></div>
  </div>

</div>

<script>
var TEAMS = [
  {name:"Portland Trail Blazers",abbr:"POR",espn:"por"},
  {name:"San Antonio Spurs",abbr:"SAS",espn:"sas"},
  {name:"Denver Nuggets",abbr:"DEN",espn:"den"},
  {name:"Minnesota Timberwolves",abbr:"MIN",espn:"min"},
  {name:"Los Angeles Lakers",abbr:"LAL",espn:"lal"},
  {name:"New York Knicks",abbr:"NYK",espn:"ny"},
  {name:"Charlotte Hornets",abbr:"CHA",espn:"cha"},
  {name:"Detroit Pistons",abbr:"DET",espn:"det"},
  {name:"Cleveland Cavaliers",abbr:"CLE",espn:"cle"},
  {name:"Houston Rockets",abbr:"HOU",espn:"hou"},
  {name:"Boston Celtics",abbr:"BOS",espn:"bos"},
  {name:"Golden State Warriors",abbr:"GSW",espn:"gsw"},
  {name:"Dallas Mavericks",abbr:"DAL",espn:"dal"},
  {name:"Los Angeles Clippers",abbr:"LAC",espn:"lac"},
  {name:"Oklahoma City Thunder",abbr:"OKC",espn:"okc"},
  {name:"Philadelphia 76ers",abbr:"PHI",espn:"phi"},
  {name:"Miami Heat",abbr:"MIA",espn:"mia"},
  {name:"Toronto Raptors",abbr:"TOR",espn:"tor"},
  {name:"Phoenix Suns",abbr:"PHX",espn:"phx"},
  {name:"Atlanta Hawks",abbr:"ATL",espn:"atl"},
  {name:"Chicago Bulls",abbr:"CHI",espn:"chi"},
  {name:"Orlando Magic",abbr:"ORL",espn:"orl"},
  {name:"Milwaukee Bucks",abbr:"MIL",espn:"mil"},
  {name:"New Orleans Pelicans",abbr:"NOP",espn:"no"},
  {name:"Indiana Pacers",abbr:"IND",espn:"ind"},
  {name:"Memphis Grizzlies",abbr:"MEM",espn:"mem"},
  {name:"Washington Wizards",abbr:"WAS",espn:"wsh"},
  {name:"Brooklyn Nets",abbr:"BKN",espn:"bkn"},
  {name:"Utah Jazz",abbr:"UTA",espn:"uta"},
  {name:"Sacramento Kings",abbr:"SAC",espn:"sac"},
];

function logoUrl(espn) {
  return "https://a.espncdn.com/i/teamlogos/nba/500/" + espn + ".png";
}

var K = 32;
var ratings = {};
var matchups = [];
var current = 0;
var DOT_COLORS = ["#BA7517","#888780","#854F0B","#7BA7C7","#8FBA8F","#C7A07B","#A78FC7","#C78FA0","#7BAFC0","#C0B87B","#A0A0A0","#B58FAF"];

function loadRatings() {
  try {
    var s = localStorage.getItem('nba_elo_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

function saveRatings() {
  try { localStorage.setItem('nba_elo_v2', JSON.stringify(ratings)); } catch(e) {}
}

function initRatings() {
  var saved = loadRatings();
  if (saved) {
    ratings = saved;
    document.getElementById('saved-note').textContent = '↑ continuing from your saved ratings';
  } else {
    TEAMS.forEach(function(t) { ratings[t.abbr] = 1200; });
  }
}

function buildMatchups() {
  matchups = [];
  for (var i = 0; i < TEAMS.length; i++)
    for (var j = i+1; j < TEAMS.length; j++)
      matchups.push([i,j]);
  for (var k = matchups.length-1; k > 0; k--) {
    var r = Math.floor(Math.random()*(k+1));
    var tmp = matchups[k]; matchups[k] = matchups[r]; matchups[r] = tmp;
  }
  current = 0;
}

function expected(ra, rb) { return 1/(1+Math.pow(10,(rb-ra)/400)); }

function updateElo(wa, la) {
  var ra = ratings[wa], rb = ratings[la], ea = expected(ra,rb);
  ratings[wa] = Math.round(ra + K*(1-ea));
  ratings[la] = Math.round(rb + K*(0-(1-ea)));
  saveRatings();
}

function pick(side) {
  var pair = matchups[current];
  if (side===0) updateElo(TEAMS[pair[0]].abbr, TEAMS[pair[1]].abbr);
  else          updateElo(TEAMS[pair[1]].abbr, TEAMS[pair[0]].abbr);
  current++;
  render();
}

function skip() { current++; render(); }

function newRound() {
  document.getElementById('done-banner').style.display = 'none';
  document.getElementById('vs-wrap').style.display = 'grid';
  document.querySelector('.skip-wrap').style.display = 'block';
  buildMatchups();
  render();
}

function render() {
  renderRankings();
  var done = current >= matchups.length;
  document.getElementById('done-banner').style.display = done ? 'flex' : 'none';
  document.getElementById('vs-wrap').style.display = done ? 'none' : 'grid';
  document.querySelector('.skip-wrap').style.display = done ? 'none' : 'block';
  document.getElementById('rankings-label').style.display = 'block';
  if (done) {
    document.getElementById('progress').textContent = '';
    return;
  }
  var pair = matchups[current];
  var a = TEAMS[pair[0]], b = TEAMS[pair[1]];
  document.getElementById('progress').textContent = 'matchup ' + (current+1) + ' / 435';
  document.getElementById('logo-a').src = logoUrl(a.espn);
  document.getElementById('logo-a').alt = a.abbr;
  document.getElementById('name-a').textContent = a.name;
  document.getElementById('rating-a').textContent = ratings[a.abbr];
  document.getElementById('logo-b').src = logoUrl(b.espn);
  document.getElementById('logo-b').alt = b.abbr;
  document.getElementById('name-b').textContent = b.name;
  document.getElementById('rating-b').textContent = ratings[b.abbr];
}

function renderRankings() {
  var sorted = TEAMS.slice().sort(function(a,b){return ratings[b.abbr]-ratings[a.abbr];});
  var max = ratings[sorted[0].abbr], min = ratings[sorted[sorted.length-1].abbr];
  document.getElementById('rankings').innerHTML = sorted.map(function(t,i){
    var pct = max===min ? 100 : Math.round(((ratings[t.abbr]-min)/(max-min))*100);
    return '<div class="rank-row">' +
      '<div class="rank-num">' + (i+1) + '</div>' +
      '<img class="rank-logo" src="' + logoUrl(t.espn) + '" alt="' + t.abbr + '"/>' +
      '<div class="rank-name">' + t.name + '</div>' +
      '<div class="rank-bar-wrap"><div class="rank-bar-track"><div class="rank-bar-fill" style="width:'+pct+'%"></div></div></div>' +
      '<div class="rank-elo">' + ratings[t.abbr] + '</div>' +
    '</div>';
  }).join('');
}

function switchTab(tab) {
  document.getElementById('tab-ranker').className = 'tab' + (tab==='ranker'?' active':'');
  document.getElementById('tab-games').className  = 'tab' + (tab==='games' ?' active':'');
  document.getElementById('view-ranker').style.display = tab==='ranker' ? '' : 'none';
  document.getElementById('view-games').style.display  = tab==='games'  ? '' : 'none';
  if (tab==='games') loadGames();
}

function getEloByName(name) {
  for (var i=0; i<TEAMS.length; i++) {
    var t = TEAMS[i];
    if (name===t.name || name.includes(t.name.split(' ').pop())) return {elo:ratings[t.abbr]||1200, abbr:t.abbr, espn:t.espn};
  }
  return {elo:1200, abbr:name.substring(0,3).toUpperCase(), espn:''};
}

var gamesLoaded = false;

function loadGames() {
  var el = document.getElementById('games-content');
  el.innerHTML = '<div class="loading">loading games...</div>';
  document.getElementById('games-note').textContent = '';

  var now = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('games-date').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

  var y = now.getFullYear();
  var m = String(now.getMonth()+1).padStart(2,'0');
  var d = String(now.getDate()).padStart(2,'0');

  fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=' + y+m+d)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var events = data.events || [];
      if (!events.length) {
        el.innerHTML = '<div class="no-games">no games scheduled today</div>';
        return;
      }
      var games = events.map(function(ev) {
        var comp = ev.competitions[0];
        var home = comp.competitors[0];
        var away = comp.competitors[1];
        var hd = getEloByName(home.team.displayName);
        var ad = getEloByName(away.team.displayName);
        var combined = hd.elo + ad.elo;
        var d2 = new Date(ev.date);
        var h = d2.getHours()%12||12, min = d2.getMinutes(), ap = d2.getHours()>=12?'PM':'AM';
        var watch = 'League Pass';
        if (comp.broadcasts&&comp.broadcasts.length) {
          var ns = comp.broadcasts[0].names||[];
          for (var i=0;i<ns.length;i++) {
            if (['ABC','ESPN','ESPN2','NBC','Prime Video','Peacock'].indexOf(ns[i])>=0){watch=ns[i];break;}
          }
        }
        return {
          homeAbbr:hd.abbr, awayAbbr:ad.abbr,
          homeEspn:hd.espn, awayEspn:ad.espn,
          homeLogo:home.team.logo, awayLogo:away.team.logo,
          homeElo:hd.elo, awayElo:ad.elo, combined:combined,
          time: h+':'+(min<10?'0':'')+min+' '+ap+' ET',
          watch:watch, score:combined+Math.random()*10
        };
      });
      games.sort(function(a,b){return b.score-a.score;});
      el.innerHTML = games.map(function(g,i){
        var rank = i+1;
        var rankColor = rank===1?'#BA7517':rank===2?'#888780':rank===3?'#854F0B':'var(--text-3)';
        var dotColor = DOT_COLORS[i%DOT_COLORS.length];
        var badge = g.watch==='League Pass'
          ? '<span class="g-badge badge-lp">League Pass</span>'
          : '<span class="g-badge badge-tv">'+g.watch+'</span>';
        var aLogo = g.awayLogo || logoUrl(g.awayEspn);
        var hLogo = g.homeLogo || logoUrl(g.homeEspn);
        return '<div class="game-card">' +
          '<div class="game-card-header">' +
            '<span class="rank-dot" style="background:'+dotColor+'"></span>' +
            '<span class="game-rank-num" style="color:'+rankColor+'">#'+rank+'</span>' +
          '</div>' +
          '<div class="game-teams">' +
            '<div class="g-team">' +
              '<img src="'+aLogo+'" alt="'+g.awayAbbr+'"/>' +
              '<div class="g-abbr">'+g.awayAbbr+'</div>' +
              '<div class="g-elo">'+g.awayElo+'</div>' +
            '</div>' +
            '<div class="g-mid">' +
              '<div class="g-at">at</div>' +
              '<div class="g-time">'+g.time+'</div>' +
              badge +
              '<div class="g-combined">'+g.combined+'</div>' +
            '</div>' +
            '<div class="g-team">' +
              '<img src="'+hLogo+'" alt="'+g.homeAbbr+'"/>' +
              '<div class="g-abbr">'+g.homeAbbr+'</div>' +
              '<div class="g-elo">'+g.homeElo+'</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      document.getElementById('games-note').textContent = 'ranked by your elo ratings';
    })
    .catch(function(){
      el.innerHTML = '<div class="no-games">couldn\'t load games — check back later</div>';
    });
}

initRatings();
buildMatchups();
render();
</script>
</body>
</html>
